<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雀荘りはら</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --felt:#0F3329; --felt-d:#0A271F; --felt-l:#184537; --felt-line:rgba(236,227,208,.14);
    --bone:#ECE3D0; --bone-h:#E2D7BD; --bone-e:#C7B698;
    --ink:#1E251B; --ink2:#5A6250;
    --red:#C23A2E; --red-d:#992A21;
    --gold:#C6A02C; --gold-l:#E2CB6E; --jade:#2E885A;
    --disp:"Shippori Mincho B1","Yu Mincho","Hiragino Mincho ProN",serif;
    --body:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    --mono:"Roboto Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--body);color:var(--bone);
    background:radial-gradient(120% 90% at 50% -10%, #1a4a3b 0%, var(--felt) 46%, var(--felt-d) 100%);
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 64px;}

  .topbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px 12px;margin-bottom:24px;}
  .brand-title{font-family:var(--disp);font-weight:800;font-size:clamp(22px,6.4vw,32px);letter-spacing:.05em;line-height:1.05;margin:0;white-space:nowrap;}
  .brand-title .dot{color:var(--red);}
  .winds{display:flex;gap:5px;}
  .wind{width:24px;height:30px;border-radius:4px;background:linear-gradient(#f3ecdb,var(--bone));border:1px solid var(--bone-e);
    box-shadow:0 2px 0 var(--bone-e),0 3px 7px rgba(0,0,0,.26);display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:15px;color:var(--ink);}
  .wind.n1{color:var(--red-d);}
  .ibtn-ico{margin-left:auto;flex:0 0 auto;width:40px;height:40px;display:grid;place-items:center;
    border:1px solid var(--felt-line);background:rgba(236,227,208,.06);color:var(--bone);border-radius:9px;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s;}
  .ibtn-ico:hover{background:rgba(236,227,208,.13);border-color:rgba(236,227,208,.3);}
  .ibtn-ico:active svg{transform:rotate(180deg);transition:transform .3s;}
  .ibtn-ico.warn{color:var(--gold);border-color:rgba(198,160,44,.5);}
  .sessionbar{display:flex;gap:10px;align-items:center;margin-bottom:22px;}
  .sess-sel{flex:1 1 auto;min-width:0;font-family:var(--disp);font-weight:600;font-size:15px;color:var(--bone);
    background:rgba(236,227,208,.06);border:1px solid var(--felt-line);border-radius:9px;padding:11px 12px;
    -webkit-appearance:none;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,rgba(236,227,208,.6) 50%),linear-gradient(135deg,rgba(236,227,208,.6) 50%,transparent 50%);
    background-position:calc(100% - 18px) calc(50% - 2px),calc(100% - 13px) calc(50% - 2px);background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px;}
  .sess-new{flex:0 0 auto;appearance:none;cursor:pointer;font-family:var(--body);font-size:13px;letter-spacing:.04em;font-weight:600;
    border:1px solid var(--bone-e);background:linear-gradient(180deg,#f1eadb,var(--bone));color:var(--ink);padding:11px 14px;border-radius:9px;white-space:nowrap;}
  .sess-new:hover{filter:brightness(1.03);}

  .sec{margin-bottom:30px;}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 2px 13px;}
  .sec-title{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:.16em;margin:0;}
  .sec-title::before{content:"";display:inline-block;width:14px;height:2px;background:var(--red);margin-right:11px;vertical-align:middle;}
  .sec-note{font-size:12px;letter-spacing:.08em;color:rgba(236,227,208,.55);}
  .subhead{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.18em;color:rgba(236,227,208,.7);margin:0 2px 11px;padding-top:4px;}
  .subhead+.stand-list{margin-bottom:24px;}

  /* standings */
  .stand-list{display:flex;flex-direction:column;gap:10px;}
  .stand{background:linear-gradient(180deg,#f1eadb,var(--bone));border:1px solid var(--bone-e);border-radius:11px;
    box-shadow:0 1px 0 #fff inset,0 6px 14px rgba(0,0,0,.26);padding:14px 16px 13px;
    display:grid;grid-template-columns:46px 1fr auto;column-gap:13px;row-gap:9px;align-items:center;}
  .stand.lead{border-color:var(--gold);box-shadow:0 1px 0 #fff inset,0 0 0 1px var(--gold),0 8px 18px rgba(0,0,0,.3);}
  .rank{grid-row:1;grid-column:1;justify-self:start;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
    font-family:var(--disp);font-weight:800;font-size:19px;color:var(--bone);background:var(--ink);}
  .stand.lead .rank{background:linear-gradient(180deg,var(--gold-l),var(--gold));color:#3a2c05;}
  .rank.r2{background:#6c7566;} .rank.r3{background:#8a7f6a;}
  .who{grid-row:1;grid-column:2;min-width:0;}
  .name{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sub{font-size:11.5px;letter-spacing:.05em;color:var(--ink2);margin-top:2px;}
  .total{grid-row:1;grid-column:3;justify-self:end;font-family:var(--mono);font-weight:700;font-size:24px;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .pos{color:var(--jade);} .neg{color:var(--red-d);} .zero{color:var(--ink2);}
  .bar{grid-row:2;grid-column:1/-1;position:relative;height:7px;border-radius:4px;background:rgba(30,37,27,.10);overflow:hidden;}
  .bar::before{content:"";position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:rgba(30,37,27,.28);}
  .bfill{position:absolute;top:0;bottom:0;border-radius:4px;}
  .bfill.pos{background:linear-gradient(90deg,var(--jade),var(--gold));}
  .bfill.neg{background:linear-gradient(90deg,var(--red),var(--red-d));}

  /* members */
  details.settings>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:2px;}
  details.settings>summary::-webkit-details-marker{display:none;}
  .msum-mark{color:var(--red);font-weight:700;font-size:18px;width:14px;display:inline-block;}
  details.settings[open] .msum-mark::before{content:"−";} details.settings:not([open]) .msum-mark::before{content:"＋";}
  .msum-title{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:.16em;}
  .msum-count{font-size:12px;letter-spacing:.08em;color:rgba(236,227,208,.55);}
  .settings-body{padding-top:15px;}
  .members{display:flex;flex-direction:column;gap:8px;}
  .member{display:flex;align-items:center;gap:10px;background:rgba(236,227,208,.06);border:1px solid var(--felt-line);border-radius:9px;padding:8px 9px 8px 12px;}
  .member-name{flex:1 1 auto;background:transparent;border:none;outline:none;color:var(--bone);font-family:var(--disp);font-weight:600;font-size:16px;
    padding:5px 2px;border-bottom:1px solid transparent;transition:border-color .15s;min-width:0;}
  .member-name:focus{border-bottom-color:var(--gold);}
  .member-meta{font-size:11px;letter-spacing:.06em;color:rgba(236,227,208,.5);white-space:nowrap;}
  .member-del{appearance:none;border:1px solid var(--felt-line);background:transparent;color:rgba(236,227,208,.7);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:17px;line-height:1;flex:0 0 auto;}
  .member-del:hover{background:rgba(194,58,46,.18);border-color:rgba(194,58,46,.5);color:#f3c9c4;}
  .member-del:disabled{opacity:.3;cursor:not-allowed;}
  .add-member{margin-top:10px;width:100%;appearance:none;cursor:pointer;border:1px dashed var(--felt-line);background:transparent;color:rgba(236,227,208,.75);
    font-family:var(--body);font-size:13px;letter-spacing:.08em;padding:11px;border-radius:9px;transition:background .15s;}
  .add-member:hover{background:rgba(236,227,208,.06);}
  .add-member:disabled{opacity:.4;cursor:not-allowed;}

  /* entry card / seats */
  .card{background:linear-gradient(180deg,#f1eadb,var(--bone));border:1px solid var(--bone-e);border-radius:12px;
    box-shadow:0 1px 0 #fff inset,0 8px 18px rgba(0,0,0,.26);padding:16px;color:var(--ink);}
  .card.editing{border-color:var(--red);box-shadow:0 1px 0 #fff inset,0 0 0 1px var(--red),0 8px 18px rgba(0,0,0,.26);}
  .edit-flag{font-size:12px;letter-spacing:.1em;color:var(--red-d);margin:0 0 13px;font-weight:600;display:none;}
  .card.editing .edit-flag{display:block;}
  .seat{border:1px solid rgba(30,37,27,.12);border-radius:10px;padding:8px 9px;margin-bottom:8px;background:#fbf8f0;display:flex;gap:6px;align-items:stretch;}
  .seat.is-auto{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
  .seat-p{flex:1 1 0;min-width:0;font-family:var(--body);font-size:13px;padding:9px 7px;border-radius:8px;border:1px solid var(--bone-e);background:#fff;color:var(--ink);
    -webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink2) 50%),linear-gradient(135deg,var(--ink2) 50%,transparent 50%);
    background-position:calc(100% - 12px) calc(50% - 2px),calc(100% - 8px) calc(50% - 2px);background-size:4px 4px,4px 4px;background-repeat:no-repeat;padding-right:20px;}
  .seat-sign{flex:0 0 auto;width:36px;appearance:none;cursor:pointer;border:1px solid var(--bone-e);border-radius:8px;background:#fff;color:var(--ink2);
    font-family:var(--mono);font-weight:700;font-size:17px;line-height:1;padding:0;transition:background .12s,color .12s,border-color .12s;}
  .seat-sign.neg{background:linear-gradient(180deg,#d0473a,var(--red));color:#fff;border-color:var(--red-d);}
  .seat.is-auto .seat-sign{display:none;}
  .seat-raw{font-family:var(--mono);font-weight:600;font-size:16px;font-variant-numeric:tabular-nums;flex:0 0 60px;width:60px;min-width:0;text-align:right;
    padding:9px 8px;border-radius:8px;border:1px solid var(--bone-e);background:#fff;color:var(--ink);box-shadow:inset 0 1px 2px rgba(30,37,27,.1);}
  .seat-raw::placeholder{color:#b3a98f;font-weight:400;font-size:11px;}
  .seat-auto{display:none;font-family:var(--mono);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;flex:0 0 60px;width:60px;text-align:right;
    color:#3a2c05;background:linear-gradient(180deg,var(--gold-l),var(--gold));padding:9px 8px;border-radius:8px;}
  .seat.is-auto .seat-raw{display:none;} .seat.is-auto .seat-auto{display:block;}
  .addmember{display:flex;gap:7px;margin:2px 0 12px;}
  .addmember[hidden]{display:none;}
  .am-input{flex:1 1 auto;min-width:0;font-family:var(--body);font-size:15px;padding:10px 11px;border-radius:8px;border:1px solid var(--bone-e);background:#fff;color:var(--ink);box-shadow:inset 0 1px 2px rgba(30,37,27,.1);}
  .am-add{flex:0 0 auto;appearance:none;cursor:pointer;border:none;font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.06em;color:#fff;background:linear-gradient(180deg,#d0473a,var(--red));box-shadow:0 2px 0 var(--red-d);padding:10px 16px;border-radius:8px;}
  .am-cancel{flex:0 0 auto;appearance:none;cursor:pointer;border:1px solid var(--bone-e);background:#fbf8f0;color:var(--ink2);font-family:var(--body);font-size:13px;padding:10px 12px;border-radius:8px;}
  .ver-note{font-size:11.5px;color:rgba(236,227,208,.6);margin:0 0 12px;letter-spacing:.04em;line-height:1.5;}
  .ver-list{display:flex;flex-direction:column;gap:7px;}
  .ver-row{display:flex;align-items:center;gap:10px;background:rgba(236,227,208,.06);border:1px solid var(--felt-line);border-radius:9px;padding:9px 10px;}
  .ver-info{flex:1 1 auto;min-width:0;}
  .ver-when{font-family:var(--mono);font-size:12.5px;color:var(--bone);font-variant-numeric:tabular-nums;}
  .ver-label{font-size:11px;color:rgba(236,227,208,.6);margin-top:1px;}
  .ver-restore{flex:0 0 auto;appearance:none;cursor:pointer;border:1px solid var(--bone-e);background:#fbf8f0;color:var(--ink);font-family:var(--body);font-size:12px;padding:8px 12px;border-radius:8px;}
  .ver-restore:hover{background:#f0ead9;}
  .ver-empty{font-size:13px;color:rgba(236,227,208,.55);}
  .modal{position:fixed;inset:0;background:rgba(8,20,16,.62);display:flex;align-items:center;justify-content:center;padding:20px;z-index:60;}
  .modal[hidden]{display:none;}
  .modal-box{width:100%;max-width:360px;background:linear-gradient(180deg,#f1eadb,var(--bone));border:1px solid var(--bone-e);border-radius:14px;box-shadow:0 14px 44px rgba(0,0,0,.5);padding:18px;color:var(--ink);}
  .modal-title{font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:.06em;margin-bottom:7px;}
  .modal-sub{font-size:12.5px;color:var(--ink2);margin-bottom:14px;line-height:1.55;}
  .modal-opts{display:flex;flex-direction:column;gap:9px;}
  .modal-opt{appearance:none;cursor:pointer;border:1px solid var(--bone-e);background:#fbf8f0;color:var(--ink);font-family:var(--disp);font-weight:600;font-size:15px;padding:13px 14px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .modal-opt:hover{background:#f0ead9;border-color:var(--gold);}
  .modal-opt .mo-val{font-family:var(--mono);font-weight:700;font-size:17px;color:var(--red);}
  .modal-cancel{appearance:none;cursor:pointer;border:none;background:transparent;color:var(--ink2);font-family:var(--body);font-size:12.5px;padding:6px;margin-top:2px;text-decoration:underline;align-self:center;}

  .preview{margin-top:6px;min-height:22px;}
  .pv-msg{font-size:13px;letter-spacing:.04em;color:var(--ink2);}
  .pv-seats{display:flex;flex-direction:column;gap:7px;}
  .pseat{display:grid;grid-template-columns:30px 1fr auto;gap:11px;align-items:center;background:#fbf8f0;border:1px solid var(--bone-e);border-radius:9px;padding:8px 11px;}
  .pseat.win{border-color:var(--gold);background:linear-gradient(180deg,#fff7e0,#fbf8f0);}
  .pp{width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--bone);display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:13px;}
  .pseat.win .pp{background:linear-gradient(180deg,var(--gold-l),var(--gold));color:#3a2c05;}
  .pinfo{min-width:0;}
  .pnames{font-family:var(--disp);font-weight:600;font-size:14.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pcalc{font-size:11px;color:var(--ink2);margin-top:1px;font-variant-numeric:tabular-nums;}
  .pright{text-align:right;}
  .pfin{font-family:var(--mono);font-weight:700;font-size:18px;font-variant-numeric:tabular-nums;}
  .psplit{font-size:11px;color:var(--ink2);margin-top:1px;font-variant-numeric:tabular-nums;}

  .row-btns{display:flex;gap:10px;margin-top:16px;}
  .btn{flex:1 1 auto;appearance:none;border:none;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.14em;
    padding:13px 16px;border-radius:9px;background:linear-gradient(180deg,#d0473a,var(--red));color:#fff;box-shadow:0 3px 0 var(--red-d);transition:transform .08s,box-shadow .08s,opacity .15s;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 0 var(--red-d);}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--red-d);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:0 3px 0 var(--red-d);}
  .btn-ghost{flex:0 0 auto;appearance:none;cursor:pointer;font-family:var(--body);font-size:13px;letter-spacing:.06em;
    padding:13px 16px;border-radius:9px;border:1px solid var(--bone-e);background:#fbf8f0;color:var(--ink2);display:none;}
  .card.editing .btn-ghost{display:block;}

  /* history */
  .hist-list{display:flex;flex-direction:column;gap:10px;}
  .game{background:linear-gradient(180deg,#f1eadb,var(--bone));border:1px solid var(--bone-e);border-radius:11px;box-shadow:0 5px 12px rgba(0,0,0,.22);padding:12px 14px;color:var(--ink);}
  .game-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .game-date{font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;color:var(--ink2);font-variant-numeric:tabular-nums;}
  .game-acts{display:flex;gap:6px;}
  .gact{appearance:none;border:1px solid var(--bone-e);background:#fbf8f0;color:var(--ink2);font-family:var(--body);font-size:11.5px;letter-spacing:.05em;padding:5px 10px;border-radius:7px;cursor:pointer;}
  .gact:hover{background:#f0ead9;}
  .gact.del:hover{background:rgba(194,58,46,.14);border-color:rgba(194,58,46,.5);color:var(--red-d);}
  .gact.hrestore{border-color:rgba(176,141,87,.6);color:var(--ink);} .gact.hrestore:hover{background:rgba(176,141,87,.16);}
  .gact.revive{border-color:rgba(90,140,90,.6);color:#2f5d2f;} .gact.revive:hover{background:rgba(90,140,90,.16);}
  .gedited{font-family:var(--body);font-size:10.5px;color:var(--gold);letter-spacing:.03em;margin-left:6px;}
  .del-head{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.08em;color:rgba(236,227,208,.6);margin:18px 0 8px;text-transform:none;}
  .dgame{background:#e6dfcf;border:1px dashed var(--bone-e);border-radius:11px;padding:12px 14px;color:var(--ink);opacity:.85;}
  .dgame .gfin,.dgame .gnames,.dgame .gsplit{filter:saturate(.55);}
  .grows{display:flex;flex-direction:column;gap:6px;}
  .grow{display:grid;grid-template-columns:24px 1fr auto;gap:10px;align-items:center;padding:5px 2px;border-bottom:1px solid rgba(30,37,27,.08);}
  .grow:last-child{border-bottom:none;}
  .grank{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--bone);display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:11px;}
  .grow.win .grank{background:linear-gradient(180deg,var(--gold-l),var(--gold));color:#3a2c05;}
  .gnames{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gsub{font-size:10.5px;color:var(--ink2);font-variant-numeric:tabular-nums;}
  .gright{text-align:right;}
  .gfin{font-family:var(--mono);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;}
  .gsplit{font-size:10.5px;color:var(--ink2);font-variant-numeric:tabular-nums;}

  .empty{border:1px dashed var(--felt-line);border-radius:11px;padding:26px 18px;text-align:center;color:rgba(236,227,208,.6);font-size:13.5px;letter-spacing:.04em;}
  .footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--felt-line);display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;}
  .foot-note{font-size:11.5px;letter-spacing:.06em;color:rgba(236,227,208,.5);max-width:62%;}
  .danger{appearance:none;cursor:pointer;border:1px solid rgba(194,58,46,.4);background:transparent;color:rgba(243,201,196,.85);font-family:var(--body);font-size:12px;letter-spacing:.06em;padding:9px 14px;border-radius:8px;transition:background .15s;}
  .danger:hover{background:rgba(194,58,46,.16);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bone);border:1px solid var(--gold);
    padding:11px 18px;border-radius:10px;font-size:13px;letter-spacing:.04em;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (max-width:520px){
    .total{font-size:21px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1 class="brand-title">雀荘りはら</h1>
    <div class="winds" aria-hidden="true">
      <div class="wind n1">東</div><div class="wind">南</div><div class="wind">西</div><div class="wind">北</div>
    </div>
    <button class="ibtn-ico" id="syncBtn" title="更新" aria-label="更新">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
    </button>
  </div>

  <div class="sessionbar">
    <select id="sessionSel" class="sess-sel" aria-label="卓を選択"></select>
    <button id="newSessionBtn" class="sess-new" type="button">＋ 新しい卓</button>
  </div>

  <section class="sec">
    <div class="card" id="entryCard">
      <p class="edit-flag" id="editFlag">編集中の半荘</p>
      <div id="entrySeats"></div>
      <div class="addmember" id="addMemberBox" hidden>
        <input class="am-input" id="amInput" type="text" maxlength="20" placeholder="メンバー名" autocomplete="off">
        <button class="am-add" id="amAdd" type="button">追加</button>
        <button class="am-cancel" id="amCancel" type="button">やめる</button>
      </div>
      <div class="preview" id="entryPreview"></div>
      <div class="row-btns">
        <button class="btn" id="saveBtn" disabled>記録</button>
        <button class="btn-ghost" id="cancelBtn">やめる</button>
      </div>
    </div>
  </section>

  <section class="sec">
    <div class="sec-head"><h2 class="sec-title">履歴</h2><span class="sec-note" id="histNote"></span></div>
    <div class="subhead">合計</div>
    <div class="stand-list" id="totalList"></div>
    <div class="subhead">半荘</div>
    <div class="hist-list" id="histList"></div>
  </section>

  <section class="sec">
    <details class="settings" id="verSettings">
      <summary><span class="msum-mark"></span><span class="msum-title">変更履歴</span><span class="msum-count" id="verCount"></span></summary>
      <div class="settings-body">
        <p class="ver-note">各変更の直前を保存(最新20件)｡選択で全体をその時点へ復元｡復元自体も巻き戻し可能｡</p>
        <div class="ver-list" id="verList"></div>
      </div>
    </details>
  </section>

    <button class="danger" id="resetBtn">この卓を消去</button>
  </div>

  <div class="modal-box">
    <div class="modal-title">端数の割当</div>

  <div class="modal-box">
    <div class="modal-title">この半荘の履歴</div>
    <div class="modal-sub" id="hmSub"></div>
    <div class="modal-opts" id="hmOpts"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  // ===== 設定(ここを編集)=====
  // CloudflareワーカーのURL(末尾スラッシュ不要)｡空または未置換ならローカルのみ動作
  var WORKER_URL = "https://score.1059rihara.workers.dev";
  // 書込み保護を使う場合のキー｡WorkerのBOARD_SECRETと一致させる｡未使用なら空のまま
  var BOARD_KEY  = "";
  // 既定の卓ルームID｡URLに ?room=xxx を付けると上書き｡グループごとに分離可能
  var DEFAULT_ROOM = "default";
  // URLクエリでの上書き(?api=...&room=...&key=...)も許容
  var _q = new URLSearchParams(location.search);
  WORKER_URL = (_q.get("api")||WORKER_URL||"").replace(/\/+$/,"");
  BOARD_KEY  = _q.get("key")||BOARD_KEY||"";
  var ROOM   = (_q.get("room")||DEFAULT_ROOM||"default").slice(0,64);
  var hasWorker = /^https?:\/\//.test(WORKER_URL) && !/YOUR-WORKER/.test(WORKER_URL);
  var LSKEY = "mahjong:cache:"+ROOM;

  var root=null, state=null, lastRev=-1, editingGameId=null, toastTimer=null, seatRestore=null, pendingAdd=null;

  function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function round1(n){return Math.round(n*10)/10;}
  function isNum(s){return /^[-+]?\d+$/.test(s);}
  function isBlank(s){return s===""||s==="-";}
  function fmt(n){
    if(n===null||n===undefined||isNaN(n))return"";
    var r=round1(n); if(r===0)return"\u00B10";
    var a=Math.abs(r); var s=(a%1===0)?a.toFixed(0):a.toFixed(1);
    return (r>0?"+":"-")+s;
  }
  function scoreClass(n){var r=round1(n);return r>0?"pos":(r<0?"neg":"zero");}
  function fmtDate(ts){var d=new Date(ts);var h=String(d.getHours()).padStart(2,"0");var m=String(d.getMinutes()).padStart(2,"0");return (d.getMonth()+1)+"/"+d.getDate()+" "+h+":"+m;}
  function fmtDay(ts){var d=new Date(ts);var w=["日","月","火","水","木","金","土"][d.getDay()];return (d.getMonth()+1)+"/"+d.getDate()+"("+w+")";}
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
  function nameOf(pid){for(var i=0;i<state.players.length;i++){if(state.players[i].id===pid)return state.players[i].name;}return "?";}
  function defaultPlayers(){return [];}
  function newSession(prevPlayers){
    var players=(prevPlayers&&prevPlayers.length)?prevPlayers.map(function(p){return {id:p.id,name:p.name};}):defaultPlayers();
    return {id:uid("s_"),label:"",ts:Date.now(),players:players,games:[]};
  }
  function valid(st){return st&&Array.isArray(st.players)&&Array.isArray(st.games);}
  function validGame(g){return g&&Array.isArray(g.seats)&&g.seats.length===4&&g.seats.every(function(s){return s&&Array.isArray(s.players)&&typeof s.score==="number";});}
  function isActive(g){return validGame(g)&&!g.deleted;}
  function activeCount(s){return s&&Array.isArray(s.games)?s.games.filter(isActive).length:0;}
  function normalize(raw){
    if(raw&&Array.isArray(raw.sessions)){
      var ss=raw.sessions.filter(valid).map(function(s){return {id:s.id||uid("s_"),label:s.label||"",ts:s.ts||Date.now(),players:s.players,games:s.games};});
      if(!ss.length)ss=[newSession(null)];
      var cur=raw.currentId; if(!ss.some(function(s){return s.id===cur;}))cur=ss[ss.length-1].id;
      return {sessions:ss,currentId:cur,history:Array.isArray(raw.history)?raw.history:[]};
    }
    if(valid(raw)){var s0={id:uid("s_"),label:"",ts:Date.now(),players:raw.players,games:raw.games};return {sessions:[s0],currentId:s0.id,history:[]};}
    var s1=newSession(null); return {sessions:[s1],currentId:s1.id,history:[]};
  }
  function usable(raw){return raw&&(Array.isArray(raw.sessions)||valid(raw));}
  function currentSession(rt){
    if(!rt||!Array.isArray(rt.sessions)||!rt.sessions.length)return null;
    return rt.sessions.filter(function(x){return x.id===rt.currentId;})[0]||rt.sessions[rt.sessions.length-1];
  }
  function pruneEmpty(rt,keepId){
    rt.sessions=rt.sessions.filter(function(s){return (s.games&&s.games.length>0)||s.id===keepId;});
    if(!rt.sessions.length)rt.sessions=[newSession(null)];
    if(!rt.sessions.some(function(s){return s.id===rt.currentId;}))rt.currentId=rt.sessions[rt.sessions.length-1].id;
    return rt;
  }

  function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove("show");},2200);}
  function setSync(kind,text){var b=document.getElementById("syncBtn");if(!b)return;b.classList.toggle("warn",kind==="warn");b.title=text||"更新";}

  // ---- scoring core ----
  // 各座席の素点(ウマ込み)から順位と個別配分を算出｡ペアは折半｡奇数は extra(pid)へ+1
  function seatShares(score,players,extra){
    var sh={};
    if(players.length<=1){ if(players[0]!==undefined)sh[players[0]]=score; return sh; }
    if(score%2===0){ sh[players[0]]=score/2; sh[players[1]]=score/2; }
    else { var lo=(score-1)/2; var hi=(extra&&players.indexOf(extra)>=0)?extra:players[0];
      players.forEach(function(p){sh[p]=(p===hi)?lo+1:lo;}); }
    return sh;
  }
  function computeGame(seats){
    var scores=seats.map(function(s){return s.score;});
    return seats.map(function(s,i){
      var better=0; scores.forEach(function(x){if(x>s.score)better++;});
      return {idx:i,score:s.score,rank:better+1,finalSeat:s.score,players:s.players,shares:seatShares(s.score,s.players,s.extra)};
    });
  }

  function computeStats(){
    var s={}; state.players.forEach(function(p){s[p.id]={total:0,played:0,tops:0,ranks:[0,0,0,0]};});
    state.games.forEach(function(g){
      if(!isActive(g))return;
      var res=computeGame(g.seats);
      res.forEach(function(seat){
        seat.players.forEach(function(pid){
          if(!s[pid])return;
          s[pid].total+=seat.shares[pid]; s[pid].played++; if(seat.rank===1)s[pid].tops++;
          if(seat.rank>=1&&seat.rank<=4)s[pid].ranks[seat.rank-1]++;
        });
      });
    });
    return s;
  }

  // ---- storage (Cloudflare Worker + KV / localStorage cache) ----
  function apiBase(){return WORKER_URL+"/state?room="+encodeURIComponent(ROOM);}
  function apiGet(){
    return fetch(apiBase(),{method:"GET",headers:{"Accept":"application/json"},cache:"no-store"})
      .then(function(r){if(!r.ok)throw new Error("get "+r.status);return r.json();})
      .then(function(rec){return {data:(rec&&rec.data)||null,rev:(rec&&rec.rev)||0};});
  }
  function apiPut(obj){
    var h={"Content-Type":"application/json"}; if(BOARD_KEY)h["x-board-key"]=BOARD_KEY;
    return fetch(apiBase(),{method:"PUT",headers:h,body:JSON.stringify(obj)})
      .then(function(r){if(!r.ok)throw new Error("put "+r.status);return r.json();});
  }
  function cacheGet(){try{var v=localStorage.getItem(LSKEY);if(v){var p=JSON.parse(v);if(usable(p))return normalize(p);}}catch(e){}return null;}
  function cacheSet(){try{localStorage.setItem(LSKEY,JSON.stringify(root));}catch(e){}}
  function clone(o){return JSON.parse(JSON.stringify(o));}
  function nowt(){return fmtDate(Date.now());}

  function keepSeatSelections(){
    if(!document.querySelector("#entrySeats .seat"))return;
    var any=false;
    var keep=snapshotSeats().map(function(s){ if(s.p1||s.p2)any=true; return {p1:s.p1,p2:s.p2,raw:""}; });
    if(any)seatRestore={snap:keep};
  }
  function adopt(rt){ if(!seatRestore&&editingGameId===null)keepSeatSelections(); root=normalize(rt); state=currentSession(root); cacheSet(); renderAll(); }

  function loadInitial(){
    if(!hasWorker){
      adopt(cacheGet()||normalize(null));
      setSync("off","ローカルのみ(WORKER_URL未設定)");
      return Promise.resolve();
    }
    return apiGet().then(function(r){
      if(r.data&&usable(r.data)){root=normalize(r.data);lastRev=r.rev;}
      else {root=cacheGet()||normalize(null);lastRev=r.rev;}
      state=currentSession(root); cacheSet(); renderAll(); setSync("ok","同期 "+nowt());
    }).catch(function(){
      root=cacheGet()||normalize(null); state=currentSession(root); renderAll();
      setSync("warn","オフライン");
    });
  }
  function draftHasInput(){
    var box=document.getElementById("addMemberBox"); if(box&&!box.hidden)return true;
    var a=document.querySelectorAll("#entrySeats .seat-raw"); for(var i=0;i<a.length;i++){var v=a[i].value.trim();if(v!==""&&v!=="-")return true;}
    return false;
  }
  function poll(){
    if(!hasWorker)return;
    if(editingGameId!==null||draftHasInput())return;
    apiGet().then(function(r){
      if(!r.data||!usable(r.data))return;
      if(r.rev<=lastRev)return;
      lastRev=r.rev; adopt(r.data); setSync("ok","同期 "+nowt());
    }).catch(function(){setSync("warn","オフライン");});
  }
  function snapOf(rt){return {sessions:clone(rt.sessions),currentId:rt.currentId};}
  function withVersion(base,next,label){
    var hist=Array.isArray(base.history)?base.history.slice():[];
    hist.push({ts:Date.now(),label:label||"変更",snap:snapOf(base)});
    if(hist.length>20)hist=hist.slice(-20);
    next.history=hist; return next;
  }
  // 変更は最新取得→適用→送信の順｡他者の記録を上書きしない｡変更前を版として記録
  function commitRoot(mutator,label){
    if(!hasWorker){
      var lbase=clone(root);
      var lnext=mutator(clone(root))||clone(root);
      adopt(withVersion(lbase,lnext,label)); return Promise.resolve();
    }
    setSync("ok","保存中");
    return apiGet().then(function(r){
      var base=(r.data&&usable(r.data))?normalize(r.data):clone(root);
      if(r.rev>lastRev)lastRev=r.rev;
      var before=clone(base);
      var next=mutator(base)||base;
      adopt(withVersion(before,next,label));
      return apiPut(root);
    }).then(function(resp){
      if(resp&&resp.rev)lastRev=resp.rev;
      setSync("ok","同期 "+nowt());
    }).catch(function(){
      setSync("warn","保存失敗"); toast("保存に失敗｡通信を確認し再操作");
    });
  }
  // セッション内の変更用ラッパ(現在の卓に適用)
  function commit(fn,label){ return commitRoot(function(rt){ var s=currentSession(rt); if(s)fn(s); return rt; }, label); }

  // ---- render: standings ----
  function renderStandings(){
    var s=computeStats();
    var rows=state.players.map(function(p){var st=s[p.id];return {p:p,total:round1(st.total),played:st.played,tops:st.tops,ranks:st.ranks};});
    rows.sort(function(a,b){if(b.total!==a.total)return b.total-a.total;return b.tops-a.tops;});
    var maxAbs=1; rows.forEach(function(r){if(Math.abs(r.total)>maxAbs)maxAbs=Math.abs(r.total);});
    document.getElementById("totalList").innerHTML=rows.map(function(r,i){
      var rank=i+1, rcls=rank===2?"r2":rank===3?"r3":"", bar="";
      if(r.total!==0){var w=Math.min(50,Math.abs(r.total)/maxAbs*50);
        bar=r.total>0?'<span class="bfill pos" style="left:50%;width:'+w+'%"></span>':'<span class="bfill neg" style="left:'+(50-w)+'%;width:'+w+'%"></span>';}
      var sub=r.played>0?(r.played+"半荘 ・ "+r.ranks.join("-")):"記録なし";
      return '<div class="stand'+(rank===1&&r.played>0?" lead":"")+'">'+
        '<div class="rank '+rcls+'">'+rank+'</div>'+
        '<div class="who"><div class="name">'+esc(r.p.name)+'</div><div class="sub">'+sub+'</div></div>'+
        '<div class="total '+scoreClass(r.total)+'">'+(r.played>0?fmt(r.total):"\u00B10")+'</div>'+
        '<div class="bar">'+bar+'</div></div>';
    }).join("");
    document.getElementById("histNote").textContent="全 "+state.games.filter(isActive).length+" 半荘";
  }

  // ---- render: entry seats ----
  function optionHTML(selectedVal,isPair){
    var html=isPair?('<option value=""'+(selectedVal?'':' selected')+'>ペアなし</option>')
                    :('<option value="" disabled hidden'+(selectedVal?'':' selected')+'>選択</option>');
    state.players.forEach(function(p){html+='<option value="'+p.id+'"'+(p.id===selectedVal?' selected':'')+'>'+esc(p.name)+'</option>';});
    if(state.players.length<16) html+='<option value="__add__">＋ メンバー追加</option>';
    return html;
  }
  function renderEntrySeats(){
    document.getElementById("entrySeats").innerHTML=[0,1,2,3].map(function(i){
      return '<div class="seat" data-idx="'+i+'">'+
        '<select class="seat-p p1">'+optionHTML("",false)+'</select>'+
        '<select class="seat-p p2">'+optionHTML("",true)+'</select>'+
        '<button class="seat-sign" type="button" tabindex="-1">+</button>'+
        '<input class="seat-raw" type="text" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="点">'+
        '<span class="seat-auto"></span></div>';
    }).join("");
    if(seatRestore){
      var snap=seatRestore.snap, add=seatRestore.add;
      var els=document.querySelectorAll("#entrySeats .seat");
      els.forEach(function(b,idx){
        var s=snap[idx]; if(!s)return;
        b.querySelector(".p1").value=(s.p1==="__add__"?"":s.p1);
        b.querySelector(".p2").value=(s.p2==="__add__"?"":s.p2);
        b.querySelector(".seat-raw").value=s.raw;
      });
      if(add&&els[add.idx])els[add.idx].querySelector(add.which).value=add.pid;
      seatRestore=null;
    }
    updatePreview();
  }
  function snapshotSeats(){
    return [].slice.call(document.querySelectorAll("#entrySeats .seat")).map(function(b){
      return {p1:b.querySelector(".p1").value,p2:b.querySelector(".p2").value,raw:b.querySelector(".seat-raw").value};
    });
  }
  function readSeats(){
    return [].slice.call(document.querySelectorAll("#entrySeats .seat")).map(function(b){
      var p1=b.querySelector(".p1").value, p2=b.querySelector(".p2").value, players=[];
      if(p1&&p1!=="__add__")players.push(p1); if(p2&&p2!=="__add__")players.push(p2);
      return {el:b,players:players,raw:b.querySelector(".seat-raw").value.trim()};
    });
  }
  function updatePreview(){
    var seats=readSeats(), pv=document.getElementById("entryPreview"), btn=document.getElementById("saveBtn");
    seats.forEach(function(s){
      s.el.classList.remove("is-auto"); s.el.querySelector(".seat-auto").textContent="";
      var sg=s.el.querySelector(".seat-sign"), neg=s.raw.charAt(0)==="-";
      if(sg){sg.classList.toggle("neg",neg);sg.textContent=neg?"\u2212":"+";}
    });
    var allP=[]; seats.forEach(function(s){s.players.forEach(function(p){allP.push(p);});});
    var dup=false,seen={}; allP.forEach(function(p){if(seen[p])dup=true;seen[p]=1;});
    var allFilled=seats.every(function(s){return s.players.length>=1;});
    var blanks=seats.filter(function(s){return isBlank(s.raw);});
    var entered=seats.filter(function(s){return !isBlank(s.raw);});
    var bad=entered.some(function(s){return !isNum(s.raw);});

    var ok=false,res=null,msg="";
    if(!allFilled)msg="";
    else if(dup)msg="同一プレイヤーが重複｡";
    else if(bad)msg="数値が不正な入力あり｡";
    else if(blanks.length===0)msg="1卓を空欄にする｡その卓を自動算出｡";
    else if(blanks.length>1)msg="空欄は1卓のみ｡残りのスコアを入力｡";
    else{
      var sum=entered.reduce(function(a,s){return a+parseInt(s.raw,10);},0);
      var scores=seats.map(function(s){return isBlank(s.raw)?-sum:parseInt(s.raw,10);});
      var bi=seats.indexOf(blanks[0]);
      blanks[0].el.classList.add("is-auto");
      blanks[0].el.querySelector(".seat-auto").textContent=fmt(scores[bi]);
      res=computeGame(seats.map(function(s,i){return {score:scores[i],players:s.players};}));
      ok=true;
    }
    if(ok){
      var sorted=res.slice().sort(function(a,b){return a.rank-b.rank||b.score-a.score;});
      pv.innerHTML='<div class="pv-seats">'+sorted.map(function(r){
        var pair=r.players.length>1, odd=pair&&(r.score%2!==0);
        var nm=r.players.map(nameOf).map(esc).join(" ・ ");
        var splitTxt = pair ? (odd ? (fmt((r.score-1)/2)+" / "+fmt((r.score-1)/2+1)+"(端数は記録時に選択)") : "各 "+fmt(r.score/2)) : "";
        return '<div class="pseat'+(r.rank===1?" win":"")+'">'+
          '<span class="pp">'+r.rank+'</span>'+
          '<div class="pinfo"><div class="pnames">'+nm+'</div>'+
            (pair?'<div class="pcalc">2人で折半</div>':'')+'</div>'+
          '<div class="pright"><div class="pfin '+scoreClass(r.finalSeat)+'">'+fmt(r.finalSeat)+'</div>'+
            (pair?'<div class="psplit">'+splitTxt+'</div>':'')+'</div></div>';
      }).join("")+'</div>';
    } else { pv.innerHTML='<div class="pv-msg">'+msg+'</div>'; }
    btn.disabled=!ok;
    return ok?res:null;
  }

  // ---- render: history ----
  function gameRowsHTML(g){
    if(!validGame(g))return '<div class="gsub">データ形式が不正</div>';
    var res=computeGame(g.seats);
    return res.slice().sort(function(a,b){return a.rank-b.rank||b.score-a.score;}).map(function(r){
      var pair=r.players.length>1; var nm=r.players.map(nameOf).map(esc).join(" ・ ");
      var splitTxt=pair?r.players.map(function(pid){return fmt(r.shares[pid]);}).join(" ・ "):"";
      return '<div class="grow'+(r.rank===1?" win":"")+'">'+
        '<span class="grank">'+r.rank+'</span>'+
        '<div><div class="gnames">'+nm+'</div></div>'+
        '<div class="gright"><div class="gfin '+scoreClass(r.finalSeat)+'">'+fmt(r.finalSeat)+'</div>'+
          (pair?'<div class="gsplit">'+splitTxt+'</div>':'')+'</div></div>';
    }).join("");
  }
  function renderHistory(){
    var list=document.getElementById("histList");
    var actives=state.games.filter(isActive).sort(function(a,b){return b.ts-a.ts;});
    var deleted=state.games.filter(function(g){return validGame(g)&&g.deleted;}).sort(function(a,b){return b.ts-a.ts;});
    if(!actives.length&&!deleted.length){list.innerHTML='<div class="empty">記録なし｡上の入力欄から半荘を追加｡</div>';return;}
    var html=actives.map(function(g){
      var nver=Array.isArray(g.vers)?g.vers.length:0;
      var restoreBtn=nver>0?'<button class="gact hrestore" type="button">戻す</button>':'';
      return '<div class="game" data-gid="'+g.id+'"><div class="game-head"><span class="game-date">'+fmtDate(g.ts)+(nver>0?' <span class="gedited">編集'+nver+'回</span>':'')+'</span>'+
        '<span class="game-acts">'+restoreBtn+'<button class="gact edit" type="button">編集</button><button class="gact del" type="button">削除</button></span></div>'+
        '<div class="grows">'+gameRowsHTML(g)+'</div></div>';
    }).join("");
    if(!actives.length)html='<div class="empty">表示できる半荘なし｡下に削除済みあり｡</div>';
    if(deleted.length){
      html+='<div class="del-head">削除済み（'+deleted.length+'）</div>'+deleted.map(function(g){
        return '<div class="dgame" data-gid="'+g.id+'"><div class="game-head"><span class="game-date">'+fmtDate(g.ts)+'</span>'+
          '<span class="game-acts"><button class="gact revive" type="button">復活</button></span></div>'+
          '<div class="grows">'+gameRowsHTML(g)+'</div></div>';
      }).join("");
    }
    list.innerHTML=html;
  }

  function renderSession(){
    var sel=document.getElementById("sessionSel"); if(!sel||!root)return;
    var opts=root.sessions.filter(function(s){return s.games.length>0||s.id===root.currentId;}).sort(function(a,b){return b.ts-a.ts;});
    sel.innerHTML=opts.map(function(s){
      var label=s.label||fmtDay(s.ts);
      return '<option value="'+s.id+'"'+(s.id===root.currentId?" selected":"")+'>'+esc(label)+'('+activeCount(s)+'半荘)</option>';
    }).join("");
  }
  function renderVersions(){
    var box=document.getElementById("verList"); if(!box||!root)return;
    var h=Array.isArray(root.history)?root.history:[];
    if(!h.length){box.innerHTML='<div class="ver-empty">まだ変更はない｡</div>';document.getElementById("verCount").textContent="";return;}
    box.innerHTML=h.slice().reverse().map(function(v,i){
      var idx=h.length-1-i;
      return '<div class="ver-row" data-idx="'+idx+'">'+
        '<div class="ver-info"><div class="ver-when">'+fmtDate(v.ts)+'</div><div class="ver-label">｢'+esc(v.label||"変更")+'｣の直前</div></div>'+
        '<button class="ver-restore" type="button">この時点へ復元</button></div>';
    }).join("");
    document.getElementById("verCount").textContent=h.length+"件";
  }
  function renderAll(){renderSession();renderStandings();renderEntrySeats();renderHistory();renderVersions();}

  // ---- entry actions ----
  function saveGame(){
    var res=updatePreview(); if(!res)return;
    var seats=readSeats();
    var sum=seats.filter(function(s){return !isBlank(s.raw);}).reduce(function(a,s){return a+parseInt(s.raw,10);},0);
    var bi=seats.findIndex(function(s){return isBlank(s.raw);});
    var seatsData=seats.map(function(s){return {players:s.players.slice(),score:isBlank(s.raw)?-sum:parseInt(s.raw,10)};});
    var editId=editingGameId, newId=uid("g_"), ts=Date.now();
    var queue=[];
    seatsData.forEach(function(sd,idx){
      if(sd.players.length===2 && sd.score%2!==0){ queue.push({idx:idx,players:sd.players.slice(),score:sd.score,lo:(sd.score-1)/2}); }
    });
    function finish(){
      var keep=snapshotSeats().map(function(s){return {p1:s.p1,p2:s.p2,raw:""};});
      exitEdit();
      seatRestore={snap:keep};
      commit(function(st){
        if(editId){
          var g=st.games.filter(function(x){return x.id===editId;})[0];
          if(g){
            g.vers=Array.isArray(g.vers)?g.vers:[];
            g.vers.push({ts:Date.now(),seats:clone(g.seats),computedSeat:g.computedSeat});
            if(g.vers.length>10)g.vers=g.vers.slice(-10);
            g.seats=seatsData; g.computedSeat=bi;
          }
          else st.games.push({id:newId,ts:ts,seats:seatsData,computedSeat:bi,vers:[],deleted:false});
        } else {
          st.games.push({id:newId,ts:ts,seats:seatsData,computedSeat:bi,vers:[],deleted:false});
        }
        return st;
      }, editId?"編集":"記録");
      toast(editId?"半荘を更新":"半荘を記録");
    }
    if(!queue.length){ finish(); return; }
    resolveFractions(queue,seatsData,finish);
  }
  function halfSummary(seats){
    if(!seats||seats.length!==4)return "";
    var top=computeGame(seats).slice().sort(function(a,b){return a.rank-b.rank||b.score-a.score;})[0];
    return top?(top.players.map(nameOf).join("・")+" "+fmt(top.finalSeat)):"";
  }
  function openHalfHistory(gid){
    var g=state.games.filter(function(x){return x.id===gid;})[0];
    if(!g||!Array.isArray(g.vers)||!g.vers.length){toast("前の内容なし");return;}
    var modal=document.getElementById("histModal");
    document.getElementById("hmSub").textContent="この半荘を過去の内容へ戻す｡現在の内容は退避され再度戻せる｡他の半荘は不変｡";
    var opts=document.getElementById("hmOpts"); opts.innerHTML="";
    g.vers.slice().reverse().forEach(function(v,i){
      var idx=g.vers.length-1-i;
      var btn=document.createElement("button"); btn.className="modal-opt"; btn.type="button";
      btn.innerHTML='<span>'+esc(fmtDate(v.ts))+'</span><span class="mo-val">'+esc(halfSummary(v.seats))+'</span>';
      btn.onclick=function(){ doHalfRestore(gid,idx); modal.hidden=true; };
      opts.appendChild(btn);
    });
    var cancel=document.createElement("button"); cancel.className="modal-cancel"; cancel.type="button"; cancel.textContent="やめる";
    cancel.onclick=function(){ modal.hidden=true; };
    opts.appendChild(cancel);
    modal.hidden=false;
  }
  function doHalfRestore(gid,verIdx){
    if(editingGameId===gid)exitEdit();
    commit(function(st){
      var g=st.games.filter(function(x){return x.id===gid;})[0]; if(!g)return st;
      var vers=Array.isArray(g.vers)?g.vers:[]; var v=vers[verIdx]; if(!v)return st;
      vers.push({ts:Date.now(),seats:clone(g.seats),computedSeat:g.computedSeat});
      g.seats=clone(v.seats); g.computedSeat=v.computedSeat;
      if(vers.length>10)vers=vers.slice(-10);
      g.vers=vers; return st;
    }, "半荘復元");
    toast("半荘を復元");
  }
  function resolveFractions(queue,seatsData,done){
    var modal=document.getElementById("fracModal"), i=0;
    function step(){
      if(i>=queue.length){ modal.hidden=true; done(); return; }
      var q=queue[i];
      document.getElementById("fracSub").textContent="卓スコア "+fmt(q.score)+"｡2で割り切れないため､多い方("+fmt(q.lo+1)+")を受け取る人を選択｡もう一方は "+fmt(q.lo)+"｡";
      var opts=document.getElementById("fracOpts"); opts.innerHTML="";
      q.players.forEach(function(pid){
        var btn=document.createElement("button"); btn.className="modal-opt"; btn.type="button";
        btn.innerHTML='<span>'+esc(nameOf(pid))+'</span><span class="mo-val">'+fmt(q.lo+1)+'</span>';
        btn.onclick=function(){ seatsData[q.idx].extra=pid; i++; step(); };
        opts.appendChild(btn);
      });
      var cancel=document.createElement("button"); cancel.className="modal-cancel"; cancel.type="button"; cancel.textContent="やめる";
      cancel.onclick=function(){ modal.hidden=true; };
      opts.appendChild(cancel);
      modal.hidden=false;
    }
    step();
  }
  function enterEdit(gid){
    var g=state.games.filter(function(x){return x.id===gid;})[0]; if(!validGame(g))return;
    editingGameId=gid;
    document.getElementById("entryCard").classList.add("editing");
    document.getElementById("saveBtn").textContent="更新";
    renderEntrySeats();
    g.seats.forEach(function(seat,i){
      var b=document.querySelector('#entrySeats .seat[data-idx="'+i+'"]'); if(!b)return;
      b.querySelector(".p1").value=seat.players[0]||"";
      b.querySelector(".p2").value=seat.players[1]||"";
      b.querySelector(".seat-raw").value=(i===g.computedSeat)?"":String(seat.score);
    });
    updatePreview();
    document.getElementById("entryCard").scrollIntoView({behavior:"smooth",block:"start"});
  }
  function exitEdit(){editingGameId=null;document.getElementById("entryCard").classList.remove("editing");document.getElementById("saveBtn").textContent="記録";}

  function openAddMember(){var box=document.getElementById("addMemberBox"),inp=document.getElementById("amInput");inp.value="";box.hidden=false;inp.focus();}
  function closeAddMember(){document.getElementById("addMemberBox").hidden=true;document.getElementById("amInput").value="";pendingAdd=null;}
  function confirmAddMember(){
    var inp=document.getElementById("amInput"); var name=(inp.value||"").trim();
    if(!name){inp.focus();return;}
    if(state.players.length>=16){toast("メンバーは最大16人");closeAddMember();return;}
    var nid=uid("p_");
    if(pendingAdd) seatRestore={snap:snapshotSeats(),add:{idx:pendingAdd.idx,which:pendingAdd.which,pid:nid}};
    document.getElementById("addMemberBox").hidden=true; inp.value=""; pendingAdd=null;
    commit(function(st){if(st.players.length<16)st.players.push({id:nid,name:name});}, "メンバー追加");
  }

  // ---- events ----
  function bind(){
    var ssel=document.getElementById("sessionSel");
    ssel.addEventListener("change",function(){
      var id=this.value;
      if(editingGameId)exitEdit();
      commitRoot(function(rt){ if(rt.sessions.some(function(s){return s.id===id;}))rt.currentId=id; return pruneEmpty(rt,rt.currentId); }, "卓切替");
    });
    document.getElementById("newSessionBtn").addEventListener("click",function(){
      var keep=confirm("新しい卓を開始｡\n\nメンバーを引き継ぐ → OK\n空(メンバーなし)から → キャンセル");
      if(editingGameId)exitEdit();
      commitRoot(function(rt){
        var cur=rt.sessions.filter(function(s){return s.id===rt.currentId;})[0];
        var ns=newSession(keep&&cur?cur.players:null);
        rt.sessions.push(ns); rt.currentId=ns.id;
        return pruneEmpty(rt,ns.id);
      }, "新しい卓");
      toast("新しい卓を開始");
    });

    var seatsEl=document.getElementById("entrySeats");
    seatsEl.addEventListener("input",function(e){if(e.target.classList.contains("seat-raw"))updatePreview();});
    seatsEl.addEventListener("focusin",function(e){if(e.target.classList.contains("seat-p"))e.target.dataset.prev=e.target.value;});
    seatsEl.addEventListener("change",function(e){
      var t=e.target; if(!t.classList.contains("seat-p"))return;
      if(t.value==="__add__"){
        var prev=t.dataset.prev||"";
        t.value=prev;                         // 追加項目には留めない
        if(state.players.length>=16){toast("メンバーは最大16人");return;}
        pendingAdd={idx:+t.closest(".seat").dataset.idx, which:t.classList.contains("p1")?".p1":".p2"};
        openAddMember();
        return;
      }
      updatePreview();
    });
    seatsEl.addEventListener("click",function(e){
      var b=e.target.closest(".seat-sign"); if(!b)return;
      var inp=b.parentElement.querySelector(".seat-raw"); var v=inp.value.trim();
      if(v.charAt(0)==="-")v=v.slice(1); else if(v==="")v="-"; else v="-"+v;
      inp.value=v; inp.focus(); updatePreview();
    });
    document.getElementById("saveBtn").addEventListener("click",saveGame);
    document.getElementById("cancelBtn").addEventListener("click",function(){exitEdit();renderEntrySeats();});

    document.getElementById("amAdd").addEventListener("click",confirmAddMember);
    document.getElementById("amInput").addEventListener("keydown",function(e){if(e.key==="Enter")confirmAddMember();});
    document.getElementById("amCancel").addEventListener("click",closeAddMember);

    document.getElementById("histList").addEventListener("click",function(e){
      var item=e.target.closest(".game,.dgame"); if(!item)return; var gid=item.dataset.gid;
      if(e.target.classList.contains("del")){
        if(!confirm("この半荘を削除する｡他の半荘は保持｡"))return;
        if(editingGameId===gid)exitEdit();
        commit(function(st){var g=st.games.filter(function(x){return x.id===gid;})[0]; if(g)g.deleted=true; return st;}, "半荘削除");
        toast("半荘を削除");
      } else if(e.target.classList.contains("edit")){ enterEdit(gid);
      } else if(e.target.classList.contains("revive")){
        commit(function(st){var g=st.games.filter(function(x){return x.id===gid;})[0]; if(g)g.deleted=false; return st;}, "半荘復活");
        toast("半荘を復活");
      } else if(e.target.classList.contains("hrestore")){
        openHalfHistory(gid);
      }
    });

    document.getElementById("syncBtn").addEventListener("click",function(){
      if(!hasWorker){toast("WORKER_URL未設定");return;}
      setSync("ok","同期中");
      apiGet().then(function(r){
        if(r.data&&usable(r.data)){lastRev=r.rev;adopt(r.data);}
        setSync("ok","同期 "+nowt());
      }).catch(function(){setSync("warn","オフライン");toast("接続に失敗");});
    });
    document.getElementById("resetBtn").addEventListener("click",function(){
      if(!state.games.length){toast("記録は空");return;}
      if(!confirm("現在の卓の記録をすべて削除する｡メンバーは保持｡"))return;
      if(!confirm("確認｡現在の卓の全記録を削除する｡変更履歴から復元可能｡"))return;
      exitEdit();
      commit(function(st){st.games=[]; return st;}, "卓消去");
      toast("この卓を消去");
    });
    document.getElementById("verList").addEventListener("click",function(e){
      var b=e.target.closest(".ver-restore"); if(!b)return;
      var idx=+b.closest(".ver-row").dataset.idx;
      var h=(root&&root.history)||[]; var v=h[idx]; if(!v||!v.snap)return;
      if(!confirm("この時点("+fmtDate(v.ts)+"｢"+(v.label||"変更")+"｣の直前)へ復元する｡現在の内容は上書きされる｡"))return;
      if(!confirm("確認｡全体をこの時点へ巻き戻す｡この復元も変更履歴から取り消し可能｡"))return;
      var snap=v.snap; if(editingGameId)exitEdit();
      commitRoot(function(rt){ rt.sessions=clone(snap.sessions); rt.currentId=snap.currentId; return rt; }, "復元");
      toast("復元しました");
    });
  }

  setSync("off","読込中");
  loadInitial().then(function(){
    renderAll(); bind();
    if(hasWorker)setInterval(poll,9000);
  });
})();
</script>
</body>
</html>
